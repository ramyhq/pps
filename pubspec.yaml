name: pps
description: Package Pricing System (PPS) - Tour Packages Pricing System.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.15.0
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  intl: ^0.20.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  decimal: ^3.2.4
  equatable: ^2.0.8
  shared_preferences: ^2.5.3
  dio: ^5.8.0+1
  flutter_svg: ^2.2.0
  json_annotation: ^4.9.0
  supabase_flutter: ^2.9.1
  pdf: ^3.11.3
  printing: ^5.14.2
  fl_chart: ^0.68.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.7.1
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/sahl_logo.jpg
    - assets/fonts/arial.ttf
    - assets/fonts/arialbd.ttf
